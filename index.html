<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>happy birthday shhod 🌸</title>
    <style>
        body {
            background: linear-gradient(135deg, #ffe5ec, #ffc2d1);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            overflow: hidden; /* عشان الورد اللي بيقع ميعملش سكرول في الشاشة */
            position: relative;
        }

        /* ===== أنيميشن تساقط الورد في الخلفية ===== */
        .falling-rose {
            position: absolute;
            top: -50px;
            pointer-events: none;
            animation: fall linear infinite;
            z-index: 0;
        }

        @keyframes fall {
            0% {
                transform: translateY(0) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(105vh) rotate(360deg);
                opacity: 0;
            }
        }

        /* حاوية الوردة الكبيرة */
        .flower-container {
            position: relative;
            width: 200px;
            height: 200px;
            margin-bottom: 20px;
            animation: float 3s ease-in-out infinite;
            z-index: 5;
        }

        /* قلب الوردة */
        .flower-center {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 50px;
            height: 50px;
            background: #ffe600;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
            box-shadow: 0 0 15px rgba(255, 230, 0, 0.6);
        }

        /* أوراق الوردة */
        .petal {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 60px;
            height: 90px;
            background: #ff4d6d;
            border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
            transform-origin: bottom center;
            margin-left: -30px;
            margin-top: -90px;
            opacity: 0.95;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.1);
        }

        /* توزيع الأوراق بشكل دائري */
        .petal:nth-child(1) { transform: rotate(0deg); }
        .petal:nth-child(2) { transform: rotate(45deg); background: #ff758f; }
        .petal:nth-child(3) { transform: rotate(90deg); }
        .petal:nth-child(4) { transform: rotate(135deg); background: #ff758f; }
        .petal:nth-child(5) { transform: rotate(180deg); }
        .petal:nth-child(6) { transform: rotate(225deg); background: #ff758f; }
        .petal:nth-child(7) { transform: rotate(270deg); }
        .petal:nth-child(8) { transform: rotate(315deg); background: #ff758f; }

        /* فرع الورقة الأخضر */
        .stem {
            position: absolute;
            top: 150px;
            left: 50%;
            width: 8px;
            height: 60px; /* قصرنا الساق شوية عشان يتناسق مع الجواب */
            background: #2d6a4f;
            transform: translateX(-50%);
            z-index: -1;
            border-radius: 4px;
        }

        /* ===== تصميم الجواب والمغلف الاحترافي ===== */
        .envelope-container {
            position: relative;
            width: 340px;
            height: 180px;
            margin-bottom: 25px;
            z-index: 6;
        }

        .envelope {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 100%;
            background: #ff4d6d;
            border-radius: 0 0 12px 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            z-index: 2;
        }

        /* غطاء الجواب */
        .envelope::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 0;
            height: 0;
            border-left: 170px solid transparent;
            border-right: 170px solid transparent;
            border-top: 110px solid #ff758f;
            transform-origin: top;
            transition: transform 0.7s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 3;
        }

        /* تأثير فتح الغطاء لورا */
        .envelope.open::before {
            transform: rotateX(180deg);
            z-index: 1;
        }

        /* ورقة الرسالة البيضاء اللى بتطلع لفوق */
        .letter {
            position: absolute;
            bottom: 10px;
            left: 15px;
            width: 310px;
            height: 155px;
            background: #ffffff;
            border-radius: 8px;
            padding: 20px;
            box-sizing: border-box;
            transition: transform 0.7s cubic-bezier(0.19, 1, 0.22, 1);
            z-index: 1;
            opacity: 0;
            text-align: center;
            border: 1px solid #ffe5ec;
        }

        /* خروج الرسالة من الجواب بنعومة وثبات */
        .envelope.open .letter {
            transform: translateY(-140px);
            height: auto;
            min-height: 220px;
            opacity: 1;
            z-index: 4;
            box-shadow: 0 -10px 25px rgba(0,0,0,0.1);
        }

        .letter h2 {
            color: #c71585;
            font-size: 1.5rem;
            margin-top: 0;
            margin-bottom: 12px;
        }

        .letter p {
            color: #4a4a4a;
            font-size: 1.05rem;
            line-height: 1.6;
            margin: 8px 0;
        }

        .highlight {
            color: #ff4d6d;
            font-weight: bold;
        }

        /* زر الفتح */
        .btn-open {
            background: #ff4d6d;
            color: white;
            border: none;
            padding: 14px 45px;
            font-size: 1.3rem;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 5px 20px rgba(255, 77, 109, 0.3);
            transition: all 0.3s ease;
            z-index: 10;
        }

        .btn-open:hover {
            background: #c71585;
            transform: translateY(-2px);
        }

        /* حركة خفيفة للوردة الكبيرة */
        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-8px) rotate(2deg); }
        }
    </style>
</head>
<body>

    <!-- الوردة الكبيرة بتاعتك -->
    <div class="flower-container">
        <div class="petal"></div>
        <div class="petal"></div>
        <div class="petal"></div>
        <div class="petal"></div>
        <div class="petal"></div>
        <div class="petal"></div>
        <div class="petal"></div>
        <div class="petal"></div>
        <div class="flower-center"></div>
        <div class="stem"></div>
    </div>

    <!-- منطقة الجواب والرسالة المخفية -->
    <div class="envelope-container">
        <div class="envelope" id="envelope">
            <div class="letter">
                <h2>كل سنة وأنتِ طيبة يا شهود! 🎉🎂</h2>
                <p><span class="highlight">♥️</span>العمر كله ليكي ياحبيبي وتحققي كل الي تتمنيه.</p>
                <p>🥹♥️♥️♥️♥️كل عام وأنتي بصحة وسعادة دايماً ياقلبي مليانة فرحة ونجاح وراحة بال وتبقي أحسن دكتورة وشكرا بجد إنك دايماً جنبي وبتسمعيني وبتهتمي بيا ياحبيبي وربنا يديمك ليا لاف يوووو ياشهوددد .</p>
                <p class="highlight" style="font-size: 1.2rem; margin-top: 15px;">🌸 عيد ميلاد سعيد 🌸</p>
            </div>
        </div>
    </div>

    <!-- زر التفاعل المباشر لفتح وغلق الجواب -->
    <button class="btn-open" id="openBtn" onclick="toggleEnvelope()">💌</button>

    <script>
        // دالة تشغيل وقفل أنيميشن الجواب بالتناوب
        function toggleEnvelope() {
            const envelope = document.getElementById('envelope');
            const btn = document.getElementById('openBtn');
            
            // لو الجواب مفتوح.. اقفله
            if (envelope.classList.contains('open')) {
                envelope.classList.remove('open');
                btn.innerText = '💌'; // يرجع لشكل الجواب المقفول
            } else {
                // لو مقفول.. افتحه
                envelope.classList.add('open');
                btn.innerText = '💖'; // يقلب لقلب دليل على الفتح
            }
        }

        // دالة إنشاء وصناعة الورد المتساقط في الخلفية بشكل تلقائي ومتجدد
        const roseTypes = ['🌸', '🌹', '✨', '💮', ' pétales']; 
        function createFallingRose() {
            const rose = document.createElement('div');
            rose.classList.add('falling-rose');
            
            const currentRose = roseTypes[Math.floor(Math.random() * roseTypes.length)];
            rose.innerText = currentRose === ' pétales' ? '🌸' : currentRose; 
            
            rose.style.left = Math.random() * 100 + 'vw';
            rose.style.fontSize = (Math.random() * 1.2 + 0.8) + 'rem';
            rose.style.animationDuration = (Math.random() * 3 + 4) + 's'; 
            rose.style.opacity = Math.random() * 0.7 + 0.3;
            
            document.body.appendChild(rose);

            setTimeout(() => {
                rose.remove();
            }, 6000);
        }

        setInterval(createFallingRose, 250);
    </script>

</body>
</html>
