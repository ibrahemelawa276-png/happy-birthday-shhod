<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Happy Birthday</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Cairo',sans-serif;
}

body{
    height:100vh;
    overflow:hidden;
    background:linear-gradient(135deg,#ffdde1,#ee9ca7);
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
}

/* النجوم */
.stars{
    position:absolute;
    width:100%;
    height:100%;
    overflow:hidden;
}

.stars span{
    position:absolute;
    width:4px;
    height:4px;
    background:white;
    border-radius:50%;
    animation:blink 2s infinite;
}

@keyframes blink{
    0%,100%{opacity:.2}
    50%{opacity:1}
}

/* الوردة */
.flower-container{
    position:relative;
    width:220px;
    height:220px;
    margin-bottom:30px;
}

.center{
    position:absolute;
    width:55px;
    height:55px;
    background:#ffcc00;
    border-radius:50%;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    z-index:5;
    box-shadow:0 0 20px rgba(255,255,255,.7);
}

.petal{
    position:absolute;
    width:90px;
    height:90px;
    background:#ff4f81;
    border-radius:50%;
    top:50%;
    left:50%;
    transform-origin:center bottom;
    opacity:0;
    animation:openFlower 2s forwards;
}

.petal:nth-child(1){
    transform:translate(-50%,-50%) rotate(0deg) translateY(-50px);
    animation-delay:.2s;
}
.petal:nth-child(2){
    transform:translate(-50%,-50%) rotate(45deg) translateY(-50px);
    animation-delay:.4s;
}
.petal:nth-child(3){
    transform:translate(-50%,-50%) rotate(90deg) translateY(-50px);
    animation-delay:.6s;
}
.petal:nth-child(4){
    transform:translate(-50%,-50%) rotate(135deg) translateY(-50px);
    animation-delay:.8s;
}
.petal:nth-child(5){
    transform:translate(-50%,-50%) rotate(180deg) translateY(-50px);
    animation-delay:1s;
}
.petal:nth-child(6){
    transform:translate(-50%,-50%) rotate(225deg) translateY(-50px);
    animation-delay:1.2s;
}
.petal:nth-child(7){
    transform:translate(-50%,-50%) rotate(270deg) translateY(-50px);
    animation-delay:1.4s;
}
.petal:nth-child(8){
    transform:translate(-50%,-50%) rotate(315deg) translateY(-50px);
    animation-delay:1.6s;
}

@keyframes openFlower{
    0%{
        opacity:0;
        transform:translate(-50%,-50%) scale(0);
    }
    100%{
        opacity:1;
    }
}

/* الزرار */
.open-btn{
    padding:14px 35px;
    border:none;
    border-radius:40px;
    background:white;
    color:#ff4f81;
    font-size:18px;
    cursor:pointer;
    font-weight:bold;
    box-shadow:0 8px 20px rgba(0,0,0,.2);
    transition:.3s;
}

.open-btn:hover{
    transform:scale(1.08);
}

/* الجواب */
.letter{
    position:absolute;
    width:320px;
    background:white;
    padding:25px;
    border-radius:20px;
    text-align:center;
    color:#444;
    line-height:2;
    box-shadow:0 15px 35px rgba(0,0,0,.2);
    top:50%;
    left:50%;
    transform:translate(-50%,-50%) scale(0);
    opacity:0;
    transition:.8s;
}

.letter.show{
    transform:translate(-50%,-50%) scale(1);
    opacity:1;
}

.letter h2{
    color:#ff4f81;
    margin-bottom:15px;
}

.heart{
    font-size:35px;
    animation:heartbeat 1s infinite;
    margin-top:10px;
}

@keyframes heartbeat{
    0%{transform:scale(1)}
    50%{transform:scale(1.2)}
    100%{transform:scale(1)}
}

.hide{
    display:none;
}
</style>
</head>

<body>

<div class="stars"></div>

<div class="flower-container" id="flower">
    <div class="petal"></div>
    <div class="petal"></div>
    <div class="petal"></div>
    <div class="petal"></div>
    <div class="petal"></div>
    <div class="petal"></div>
    <div class="petal"></div>
    <div class="petal"></div>
    <div class="center"></div>
</div>

<button class="open-btn" onclick="openLetter()">
    افتحي الجواب 💌
</button>

<div class="letter" id="letter">
    <h2>Happy Birthday 🎂</h2>

    <p>
        كل سنة وانتي أجمل حاجة حصلت 💖<br>
        يارب ضحكتك تفضل منورة الدنيا دايمًا ✨<br>
        وتحققي كل اللي نفسك فيه 🌸
    </p>

    <div class="heart">❤️</div>
</div>

<script>

/* نجوم عشوائية */
const starsContainer = document.querySelector('.stars');

for(let i=0;i<80;i++){
    let star=document.createElement('span');

    star.style.top=Math.random()*100+'%';
    star.style.left=Math.random()*100+'%';
    star.style.animationDelay=Math.random()*2+'s';

    starsContainer.appendChild(star);
}

/* فتح الجواب */
function openLetter(){
    document.getElementById('letter').classList.add('show');
    document.querySelector('.open-btn').classList.add('hide');
    document.getElementById('flower').style.transform="scale(.8)";
}

</script>

</body>
</html>
